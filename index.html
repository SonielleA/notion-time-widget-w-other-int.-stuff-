<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aesthetic Friends Clock Fixed</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf9f6;
      --cal-bg: #ffffff;
      --accent-green: #4F7942;
      --text-main: #1a1a1a;
      --text-dim: #999;
      --border-dark: #dddddd;
      --hover-bg: #f5f5f5;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --cal-bg: #1e1e1e;
      --text-main: #f0f0f0;
      --text-dim: #777;
      --border-dark: #444;
      --hover-bg: #2a2a2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      transition: background 0.3s ease, color 0.3s ease;
      perspective: 1000px;
    }

    .clock-container {
      width: 260px; 
      height: 160px; 
      position: relative;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .clock-container.flipped { transform: rotateY(180deg); }

    .clock-card {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background: var(--cal-bg);
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.03);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      transition: background 0.3s ease;
    }

    .clock-card-back { transform: rotateY(180deg); }

    .flip-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* Shifting the front button to the left side */
    .flip-btn-left {
      left: 8px;
      left: auto;
    }

    .friend-label-front {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent-green);
      margin-bottom: 2px;
      font-weight: 600;
    }

    .date-row {
      margin-bottom: -2px;
      display: flex;
      align-items: baseline;
      gap: 5px;
      color: var(--text-main);
    }

    .month-serif { 
      font-family: 'Playfair Display', serif; 
      font-size: 16px; 
      font-style: italic; 
      font-weight: 600; 
    }
    
    .day-year-sans { 
      font-size: 12px; 
      color: var(--text-dim); 
    }

    .time-display {
      font-size: 32px; 
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--text-main);
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border-dark);
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 8px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .search-group { width: 100%; margin-bottom: 6px; }
    
    .section-title { 
      font-size: 7px; 
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    
    input.search-bar {
      width: 100%;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border-dark);
      background: var(--bg);
      color: var(--text-main);
      font-size: 10px;
      outline: none;
    }
  </style>
</head>
<body>

<div class="clock-container" id="card-container">
  <!-- Front Card -->
  <div class="clock-card">
    <button class="flip-btn flip-btn-left" onclick="toggleFlip()">←</button>
    <div class="date-row">
      <span class="month-serif" id="month">--</span>
      <span class="day-year-sans" id="day-year">--</span>
    </div>
    <div class="time-display" id="time">--:-- --</div>
    <div id="display-name" class="friend-label-front">My Time</div>
    <button class="theme-toggle" id="theme-btn">Switch Mode</button>
  </div>

  <!-- Back Card -->
  <div class="clock-card clock-card-back">
    <button class="flip-btn" onclick="toggleFlip()">→</button>
    <div class="search-group">
      <div class="section-title">Friends Time</div>
      <input list="friends-options" id="friend-search" class="search-bar" placeholder="Select friend...">
      <datalist id="friends-options"></datalist>
    </div>
    <div class="search-group">
      <div class="section-title">Search Location</div>
      <input list="tz-options" id="location-search" class="search-bar" placeholder="City or Country...">
      <datalist id="tz-options"></datalist>
    </div>
  </div>
</div>

<script>
  const container = document.getElementById('card-container');
  const displayName = document.getElementById('display-name');
  const themeBtn = document.getElementById('theme-btn');
  let currentTz = "Europe/Bucharest";

  const friends = [
    { name: "My Time", zone: "Europe/Bucharest" },
    { name: "Alicia", zone: "Asia/Singapore" },
    { name: "Andrew", zone: "Asia/Singapore" },
    { name: "Thomas", zone: "Europe/London" },
    { name: "Sofia", zone: "Europe/Paris" }
  ];

  const friendsList = document.getElementById('friends-options');
  friends.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.name;
    friendsList.appendChild(opt);
  });

  const zones = Intl.supportedValuesOf('timeZone');
  const tzList = document.getElementById('tz-options');
  zones.forEach(zone => {
    const opt = document.createElement('option');
    opt.value = zone;
    tzList.appendChild(opt);
  });

  function setClock(tz, name) {
    currentTz = tz;
    displayName.textContent = name;
    updateClock();
    toggleFlip();
    document.getElementById('friend-search').value = "";
    document.getElementById('location-search').value = "";
  }

  document.getElementById('friend-search').oninput = (e) => {
    const match = friends.find(f => f.name === e.target.value);
    if (match) setClock(match.zone, match.name);
  };

  document.getElementById('location-search').oninput = (e) => {
    if (zones.includes(e.target.value)) {
      const cityName = e.target.value.split('/').pop().replace(/_/g, ' ');
      setClock(e.target.value, cityName);
    }
  };

  function toggleFlip() { container.classList.toggle('flipped'); }

  themeBtn.onclick = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const nextTheme = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nextTheme);
    themeBtn.textContent = nextTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
  };

  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { 
      timeZone: currentTz,
      hour: 'numeric', minute: '2-digit', hour12: true 
    }).toLowerCase();
    const monthStr = now.toLocaleDateString('en-US', { timeZone: currentTz, month: 'long' });
    const dayYearStr = now.toLocaleDateString('en-US', { timeZone: currentTz, day: 'numeric' }) 
      + ", " + now.toLocaleDateString('en-US', { timeZone: currentTz, year: 'numeric' });
    document.getElementById("time").textContent = timeStr;
    document.getElementById("month").textContent = monthStr;
    document.getElementById("day-year").textContent = dayYearStr;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
